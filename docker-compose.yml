services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./infra/postgres/003_phase2.sql:/docker-entrypoint-initdb.d/003_phase2.sql:ro
      - ./infra/postgres/004_algorithm_v2.sql:/docker-entrypoint-initdb.d/004_algorithm_v2.sql:ro
      - ./infra/postgres/005_anomaly_detection.sql:/docker-entrypoint-initdb.d/005_anomaly_detection.sql:ro
      - ./infra/postgres/006_ip_allowlist.sql:/docker-entrypoint-initdb.d/006_ip_allowlist.sql:ro
      - ./infra/postgres/007_add_gitlab_confluence_platforms.sql:/docker-entrypoint-initdb.d/007_add_gitlab_confluence_platforms.sql:ro
      - ./infra/postgres/008_bot_configs.sql:/docker-entrypoint-initdb.d/008_bot_configs.sql:ro
      - ./infra/postgres/009_roi_reports.sql:/docker-entrypoint-initdb.d/009_roi_reports.sql:ro
      - ./infra/postgres/010_agent_sessions.sql:/docker-entrypoint-initdb.d/010_agent_sessions.sql:ro
      - ./infra/postgres/011_audit_log.sql:/docker-entrypoint-initdb.d/011_audit_log.sql:ro
      - ./infra/postgres/012_gdpr_compliance.sql:/docker-entrypoint-initdb.d/012_gdpr_compliance.sql:ro
      - ./infra/postgres/013_kpi_v3.sql:/docker-entrypoint-initdb.d/013_kpi_v3.sql:ro
      - ./infra/postgres/014_ml_infrastructure.sql:/docker-entrypoint-initdb.d/014_ml_infrastructure.sql:ro
      - ./infra/postgres/015_pii_violations.sql:/docker-entrypoint-initdb.d/015_pii_violations.sql:ro
      - ./infra/postgres/016_drop_kpi_tables.sql:/docker-entrypoint-initdb.d/016_drop_kpi_tables.sql:ro
      - ./infra/postgres/017_industry_compliance.sql:/docker-entrypoint-initdb.d/017_industry_compliance.sql:ro
      - ./infra/postgres/018_routing_events.sql:/docker-entrypoint-initdb.d/018_routing_events.sql:ro
      - ./infra/postgres/019_policy_rules.sql:/docker-entrypoint-initdb.d/019_policy_rules.sql:ro
      - ./infra/postgres/020_cost_settings.sql:/docker-entrypoint-initdb.d/020_cost_settings.sql:ro
      - ./infra/postgres/021_budget_alert_log.sql:/docker-entrypoint-initdb.d/021_budget_alert_log.sql:ro
      - ./infra/postgres/022_siem.sql:/docker-entrypoint-initdb.d/022_siem.sql:ro
      - ./infra/postgres/023_smart_routing_cost.sql:/docker-entrypoint-initdb.d/023_smart_routing_cost.sql:ro
      - ./infra/postgres/024_add_password_hash.sql:/docker-entrypoint-initdb.d/024_add_password_hash.sql:ro
      - ./infra/postgres/025_prompt_compression.sql:/docker-entrypoint-initdb.d/025_prompt_compression.sql:ro
      - ./infra/postgres/026_fallback_model.sql:/docker-entrypoint-initdb.d/026_fallback_model.sql:ro
      - ./infra/postgres/027_rate_limits.sql:/docker-entrypoint-initdb.d/027_rate_limits.sql:ro
      - ./infra/postgres/028_oidc_config.sql:/docker-entrypoint-initdb.d/028_oidc_config.sql:ro
      - ./infra/postgres/029_rbac_roles.sql:/docker-entrypoint-initdb.d/029_rbac_roles.sql:ro
      - ./infra/postgres/030_alert_configs.sql:/docker-entrypoint-initdb.d/030_alert_configs.sql:ro
      - ./infra/postgres/031_quota_requests.sql:/docker-entrypoint-initdb.d/031_quota_requests.sql:ro
      - ./infra/postgres/032_retention_cleanup_log.sql:/docker-entrypoint-initdb.d/032_retention_cleanup_log.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-}"
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  parser:
    build: ./parser
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles: ["app"]

  gateway:
    build: ./gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT}:8080"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      parser:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles: ["app"]

  admin:
    build: ./admin
    restart: unless-stopped
    ports:
      - "${ADMIN_PORT}:8081"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles: ["app"]

  dashboard:
    build: ./dashboard
    restart: unless-stopped
    ports:
      - "${DASHBOARD_PORT}:3000"
    env_file: .env
    depends_on:
      admin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    profiles: ["app"]

  # nginx — SSL termination + reverse proxy. Enable with --profile ssl.
  # Requires cert/key at ./infra/nginx/certs/fullchain.pem and privkey.pem.
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - dashboard
      - admin
      - gateway
    profiles: ["ssl"]

volumes:
  postgres_data:
  redis_data:
