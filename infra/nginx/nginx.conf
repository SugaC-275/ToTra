# ToTra production nginx reverse proxy with SSL termination.
# Usage:
#   1. Place your cert/key at the paths in ssl_certificate / ssl_certificate_key.
#   2. Replace example.com with your domain everywhere.
#   3. docker-compose up -d nginx  (requires the nginx service in docker-compose.yml).

events {
    worker_connections 1024;
}

http {
    # ── Security headers applied to every response ─────────────────────────
    add_header X-Frame-Options           SAMEORIGIN       always;
    add_header X-Content-Type-Options    nosniff          always;
    add_header X-XSS-Protection          "1; mode=block"  always;
    add_header Referrer-Policy           no-referrer-when-downgrade always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Redirect HTTP → HTTPS ──────────────────────────────────────────────
    server {
        listen 80;
        server_name example.com;
        return 301 https://$host$request_uri;
    }

    # ── Dashboard (React) ──────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name example.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Dashboard SPA
        location / {
            proxy_pass         http://dashboard:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Admin API
        location /api/ {
            proxy_pass         http://admin:8081;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Auth endpoint
        location /api/auth/ {
            proxy_pass         http://admin:8081;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Tighter timeout for auth
            proxy_read_timeout 15s;
        }
    }

    # ── LLM Gateway ───────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name gateway.example.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # Streaming proxy — disable buffering so SSE tokens flow immediately
        location / {
            proxy_pass             http://gateway:8080;
            proxy_http_version     1.1;
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_set_header       Connection        "";
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     300s;
            proxy_send_timeout     300s;
            chunked_transfer_encoding on;
        }
    }
}
